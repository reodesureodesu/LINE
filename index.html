<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE Ultimate Stable</title>
<style>
:root {
  --line-green: #06c755;
  --line-green-dark: #05ad4a;
  --bg-gradient: linear-gradient(160deg, #d8f9e8 0%, #e6f0ff 55%, #f3ecff 100%);
  --surface: #ffffff;
  --surface-soft: #f6f8fb;
  --text-primary: #1f2937;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 16px 40px rgba(16, 24, 40, 0.14);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  color: var(--text-primary);
}

#app {
  width: min(100%, 420px);
  height: min(92vh, 760px);
  background: var(--surface);
  border-radius: 28px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.8);
}

header {
  background: linear-gradient(120deg, var(--line-green) 0%, #2cd56e 100%);
  color: white;
  padding: 20px;
  text-align: center;
  font-weight: 700;
  letter-spacing: 0.03em;
  font-size: 1.05rem;
}

#auth {
  padding: 28px 22px;
  text-align: center;
  display: grid;
  gap: 12px;
  background: linear-gradient(180deg, #ffffff 0%, #fbfffd 100%);
}

#statusBar {
  min-height: 38px;
  padding: 9px 12px;
  font-size: 0.85rem;
  border-radius: 10px;
  background: #eff6ff;
  color: #1d4ed8;
  display: none;
  text-align: left;
}

#statusBar.error {
  background: #fef2f2;
  color: #b91c1c;
}

#statusBar.success {
  background: #ecfdf5;
  color: #047857;
}

#auth h2 {
  margin: 0 0 2px;
  font-size: 1.1rem;
}

#auth p {
  margin: 0 0 12px;
  color: var(--text-muted);
  font-size: 0.92rem;
}

#chat {
  display: none;
  flex: 1;
  flex-direction: column;
  background: linear-gradient(180deg, #f8fcff 0%, #f2fbf6 100%);
}

#toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}

#toolbar input {
  padding: 8px 10px;
}

.message-meta {
  display: block;
  margin-top: 6px;
  font-size: 0.72rem;
  opacity: 0.75;
}

.hidden {
  display: none !important;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  margin: 0;
  padding: 10px 14px;
  border-radius: 16px;
  max-width: 78%;
  word-break: break-word;
  line-height: 1.4;
  box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
}

.me {
  background: var(--line-green);
  color: white;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}

.other {
  background: #ffffff;
  color: var(--text-primary);
  margin-right: auto;
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.chatimg {
  width: 100%;
  max-width: 190px;
  border-radius: 10px;
  margin-top: 8px;
  display: block;
}

#inputArea {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

#imageInput {
  grid-column: 1 / -1;
}

#actions {
  display: flex;
  gap: 8px;
}

input,
button {
  font: inherit;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

input {
  width: 100%;
  background: var(--surface-soft);
}

input:focus {
  outline: 2px solid rgba(6, 199, 85, 0.25);
  border-color: var(--line-green);
}

button {
  background: var(--line-green);
  color: white;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.12s ease, opacity 0.12s ease, background 0.2s ease;
}

button:hover {
  transform: translateY(-1px);
  opacity: 0.96;
}

button:active {
  transform: translateY(0);
}

#googleLogin {
  background: #ffffff;
  color: #111827;
  border: 1px solid #d1d5db;
}

#logout {
  margin: 0 12px 12px;
  background: #ef4444;
}

#aiBtn {
  background: #6366f1;
}

#themeToggle {
  background: #111827;
}

body.dark {
  --bg-gradient: linear-gradient(160deg, #0f172a 0%, #111827 60%, #1f2937 100%);
  --surface: #111827;
  --surface-soft: #1f2937;
  --text-primary: #f9fafb;
  --text-muted: #9ca3af;
  --border: #374151;
}

body.dark #googleLogin,
body.dark #toolbar,
body.dark #inputArea {
  background: #1f2937;
  color: #f9fafb;
}

body.dark .other {
  background: #1f2937;
  color: #f9fafb;
}
</style>
</head>
<body>
<div id="app">
<header>LINE Ultimate</header>

<div id="auth">
  <h2>ログインしてチャットを始めましょう</h2>
  <p>Google またはメールアドレスでサインインできます。</p>
  <div id="statusBar"></div>
  <button id="googleLogin">Googleログイン</button>
  <input id="email" placeholder="email" autocomplete="email">
  <input id="password" type="password" placeholder="password" autocomplete="current-password">
  <input id="displayName" placeholder="表示名（任意）" autocomplete="nickname">
  <button id="register">新規登録</button>
  <button id="login">ログイン</button>
</div>

<div id="chat">
  <div id="toolbar">
    <input id="searchInput" placeholder="メッセージ検索...">
    <button id="themeToggle">テーマ</button>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="message">
    <div id="actions">
      <button id="send">送信</button>
      <button id="aiBtn">AI</button>
    </div>
    <input type="file" id="imageInput" accept="image/*">
  </div>
  <button id="logout">ログアウト</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup,
createUserWithEmailAndPassword, signInWithEmailAndPassword,
onAuthStateChanged, signOut, updateProfile }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot,
query, orderBy, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.appspot.com",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};

const GEMMA_KEY = "AIzaSyDY0Jcd-72QPZlfOJAtUCYxeRrjHBvJRtQ";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const googleProvider = new GoogleAuthProvider();

const authDiv = document.getElementById("auth");
const chatDiv = document.getElementById("chat");
const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msg");
const imageInput = document.getElementById("imageInput");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const displayNameInput = document.getElementById("displayName");
const statusBar = document.getElementById("statusBar");
const searchInput = document.getElementById("searchInput");

const authErrorMessages = {
  "auth/email-already-in-use": "このメールアドレスはすでに登録されています。ログインをお試しください。",
  "auth/invalid-email": "メールアドレスの形式が正しくありません。",
  "auth/missing-password": "パスワードを入力してください。",
  "auth/weak-password": "パスワードは6文字以上で入力してください。",
  "auth/invalid-credential": "メールアドレスまたはパスワードが正しくありません。",
  "auth/popup-closed-by-user": "Googleログインがキャンセルされました。"
};

let allMessages = [];

const formatTime = (value)=> {
  const date = value?.toDate ? value.toDate() : null;
  if(!date) return "送信中...";
  return date.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
};

const setStatus = (message, type="info")=>{
  if(!message){
    statusBar.style.display = "none";
    statusBar.textContent = "";
    statusBar.className = "";
    return;
  }
  statusBar.textContent = message;
  statusBar.style.display = "block";
  statusBar.className = type;
};

const showAuthError = (error)=>{
  const msg = authErrorMessages[error.code] || `認証エラーが発生しました (${error.code || "unknown"})`;
  setStatus(msg, "error");
};

const renderMessages = (messages, user)=>{
  const keyword = searchInput.value.trim().toLowerCase();
  messagesDiv.innerHTML = "";

  messages
    .filter((item)=>!keyword || (item.text || "").toLowerCase().includes(keyword))
    .forEach((data)=>{
      const div=document.createElement("div");
      div.className="msg "+(data.uid===user.uid?"me":"other");
      div.textContent=data.text||"";

      if(data.image){
        const img=document.createElement("img");
        img.src=data.image;
        img.className="chatimg";
        div.appendChild(img);
      }

      const meta = document.createElement("small");
      meta.className = "message-meta";
      meta.textContent = `${data.name || "匿名"}・${formatTime(data.createdAt)}`;
      div.appendChild(meta);

      messagesDiv.appendChild(div);
    });

  messagesDiv.scrollTop=messagesDiv.scrollHeight;
};

/* ログイン */
document.getElementById("googleLogin").onclick =
()=> signInWithPopup(auth,googleProvider)
  .then(()=>setStatus("Googleでログインしました。", "success"))
  .catch(showAuthError);

document.getElementById("register").onclick = async()=>{
  try{
    setStatus("");
    const credential = await createUserWithEmailAndPassword(auth,
      emailInput.value,passwordInput.value);

    if(displayNameInput.value.trim()){
      await updateProfile(credential.user, {
        displayName: displayNameInput.value.trim()
      });
    }
    setStatus("新規登録に成功しました。", "success");
  }catch(e){showAuthError(e);}
};

document.getElementById("login").onclick = async()=>{
  try{
    setStatus("");
    await signInWithEmailAndPassword(auth,
      emailInput.value,passwordInput.value);
    setStatus("ログインに成功しました。", "success");
  }catch(e){showAuthError(e);}
};

document.getElementById("logout").onclick =
()=> signOut(auth);

/* 認証監視 */
onAuthStateChanged(auth,user=>{
  if(!user){
    authDiv.style.display="grid";
    chatDiv.style.display="none";
    return;
  }

  authDiv.style.display="none";
  chatDiv.style.display="flex";

  const q=query(collection(db,"messages"),
    orderBy("createdAt"));

  onSnapshot(q,snap=>{
    allMessages = [];
    snap.forEach((doc)=>allMessages.push(doc.data()));
    renderMessages(allMessages, user);
  });
});

searchInput.oninput = ()=>{
  if(auth.currentUser){
    renderMessages(allMessages, auth.currentUser);
  }
};

/* 送信 */
document.getElementById("send").onclick=async()=>{
  if(!auth.currentUser)return;
  if(!msgInput.value.trim() && !imageInput.files[0]) return;

  let imageBase64=null;
  const file=imageInput.files[0];

  if(file){
    imageBase64=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=()=>res(reader.result);
      reader.readAsDataURL(file);
    });
  }

  await addDoc(collection(db,"messages"),{
    text:msgInput.value.trim(),
    image:imageBase64,
    name:auth.currentUser.displayName || emailInput.value || "匿名",
    uid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });

  msgInput.value="";
  imageInput.value="";
};

/* AI */
document.getElementById("aiBtn").onclick=async()=>{
  const text=msgInput.value;
  if(!text)return;

  const res=await fetch(
  "https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"org_01kjpzdja9fantcz1g0jmhare9"
    },
    body:JSON.stringify({
      model:"gemma-7b-it",
      messages:[{role:"user",content:text}]
    })
  });

  const data=await res.json();
  msgInput.value=data.choices?.[0]?.message?.content || "AI応答を取得できませんでした";
};

msgInput.addEventListener("keydown", (event)=>{
  if(event.key === "Enter"){
    event.preventDefault();
    document.getElementById("send").click();
  }
});

document.getElementById("themeToggle").onclick = ()=>{
  document.body.classList.toggle("dark");
};
</script>
</body>
</html>
