<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LINE Free Ultimate</title>
<style>
body{margin:0;font-family:sans-serif}
#sidebar{width:30%;float:left;height:100vh;background:#fff;padding:10px;box-sizing:border-box}
#chatArea{width:70%;float:left;height:100vh;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:10px}
.message{padding:8px;margin:5px;border-radius:10px;max-width:60%}
.me{background:#9fe8a3;margin-left:auto}
.other{background:#fff}
#inputArea{display:flex}
</style>
</head>
<body>

<div id="sidebar">
<h3>Profile</h3>
<input id="nameInput" placeholder="Name"><br>
<input id="bioInput" placeholder="Bio"><br>
<input id="bgInput" placeholder="Background color (#e5ddd5)"><br>
<button id="saveProfile">Save</button>
<hr>
<button id="logoutBtn">Logout</button>
</div>

<div id="chatArea">
<div id="messages"></div>
<div id="inputArea">
<input id="msg" style="flex:1">
<button id="sendBtn">Send</button>
<button id="stampBtn">😊</button>
<button id="aiBtn">AI</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore,doc,setDoc,getDoc,collection,addDoc,onSnapshot,query,orderBy,serverTimestamp,updateDoc,arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.appspot.com",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};
  
const GEMMA_KEY = "AIzaSyDY0Jcd-72QPZlfOJAtUCYxeRrjHBvJRtQ";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userData = null;

onAuthStateChanged(auth, async (user)=>{
if(!user){ location.href="login.html"; return; }

await setDoc(doc(db,"users",user.uid),{
online:true
},{merge:true});

const snap = await getDoc(doc(db,"users",user.uid));
userData = snap.data();
if(userData?.background) document.body.style.background=userData.background;

listenMessages();
});

async function listenMessages(){
onSnapshot(query(collection(db,"rooms","global","messages"),orderBy("createdAt")),snap=>{
const div=document.getElementById("messages");
div.innerHTML="";
snap.forEach(d=>{
const data=d.data();
const m=document.createElement("div");
m.className="message "+(data.uid===auth.currentUser.uid?"me":"other");

m.innerHTML=data.text;

if(data.readBy?.length>1){
m.innerHTML+="<div style='font-size:10px'>既読</div>";
}

div.appendChild(m);

if(!data.readBy?.includes(auth.currentUser.uid)){
updateDoc(d.ref,{
readBy:arrayUnion(auth.currentUser.uid)
});
}
});
});
}

document.getElementById("sendBtn").onclick=async()=>{
if(!msg.value) return;
await addDoc(collection(db,"rooms","global","messages"),{
text:msg.value,
uid:auth.currentUser.uid,
readBy:[auth.currentUser.uid],
createdAt:serverTimestamp()
});
msg.value="";
};

document.getElementById("stampBtn").onclick=async()=>{
await addDoc(collection(db,"rooms","global","messages"),{
text:"😊",
uid:auth.currentUser.uid,
readBy:[auth.currentUser.uid],
createdAt:serverTimestamp()
});
};

document.getElementById("aiBtn").onclick=async()=>{
if(!msg.value) return;

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemma-2b:generateContent?key="+GEMMA_KEY,
{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
contents:[{parts:[{text:msg.value}]}]
})
}
);

const data=await response.json();

await addDoc(collection(db,"rooms","global","messages"),{
text:data.candidates[0].content.parts[0].text,
uid:"AI",
readBy:[],
createdAt:serverTimestamp()
});

msg.value="";
};

document.getElementById("saveProfile").onclick=async()=>{
await setDoc(doc(db,"users",auth.currentUser.uid),{
name:nameInput.value,
bio:bioInput.value,
background:bgInput.value
},{merge:true});

document.body.style.background=bgInput.value;
};

document.getElementById("logoutBtn").onclick=()=>{
setDoc(doc(db,"users",auth.currentUser.uid),{online:false},{merge:true});
signOut(auth);
};
</script>
</body>
</html>
