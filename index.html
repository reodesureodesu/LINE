<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LINE Ultimate Stable</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#app{
  width:390px;
  height:680px;
  background:white;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
header{
  background:#06c755;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}
#auth{
  padding:20px;
  text-align:center;
}
#chat{
  display:none;
  flex:1;
  flex-direction:column;
}
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.msg{
  margin:6px 0;
  padding:8px 12px;
  border-radius:15px;
  max-width:70%;
  word-wrap:break-word;
}
.me{background:#06c755;color:white;margin-left:auto;}
.other{background:#eee;}
.chatimg{max-width:140px;border-radius:10px;margin-top:5px;}
#inputArea{
  display:flex;
  padding:10px;
  gap:5px;
}
input,button{
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#06c755;
  color:white;
  border:none;
  cursor:pointer;
}
#logout{
  background:#ff4d4d;
}
</style>
</head>
<body>
<div id="app">
<header>LINE Ultimate</header>

<div id="auth">
  <button id="googleLogin">Googleログイン</button><br><br>
  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button id="register">新規登録</button>
  <button id="login">ログイン</button>
</div>

<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="message">
    <input type="file" id="imageInput">
    <button id="send">送信</button>
    <button id="aiBtn">AI</button>
  </div>
  <button id="logout">ログアウト</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup,
createUserWithEmailAndPassword, signInWithEmailAndPassword,
onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot,
query, orderBy, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.appspot.com",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};
  
const GEMMA_KEY = "AIzaSyDY0Jcd-72QPZlfOJAtUCYxeRrjHBvJRtQ";
  
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const googleProvider = new GoogleAuthProvider();

const authDiv = document.getElementById("auth");
const chatDiv = document.getElementById("chat");
const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msg");
const imageInput = document.getElementById("imageInput");

/* ログイン */
document.getElementById("googleLogin").onclick =
()=> signInWithPopup(auth,googleProvider);

document.getElementById("register").onclick = async()=>{
  try{
    await createUserWithEmailAndPassword(auth,
      email.value,password.value);
  }catch(e){alert(e.message);}
};

document.getElementById("login").onclick = async()=>{
  try{
    await signInWithEmailAndPassword(auth,
      email.value,password.value);
  }catch(e){alert(e.message);}
};

document.getElementById("logout").onclick =
()=> signOut(auth);

/* 認証監視 */
onAuthStateChanged(auth,user=>{
  if(!user){
    authDiv.style.display="block";
    chatDiv.style.display="none";
    return;
  }

  authDiv.style.display="none";
  chatDiv.style.display="flex";

  const q=query(collection(db,"messages"),
    orderBy("createdAt"));

  onSnapshot(q,snap=>{
    messagesDiv.innerHTML="";
    snap.forEach(doc=>{
      const data=doc.data();
      const div=document.createElement("div");
      div.className="msg "+(data.uid===user.uid?"me":"other");
      div.innerHTML=data.text||"";

      if(data.image){
        const img=document.createElement("img");
        img.src=data.image;
        img.className="chatimg";
        div.appendChild(img);
      }

      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop=messagesDiv.scrollHeight;
  });
});

/* 送信 */
document.getElementById("send").onclick=async()=>{
  if(!auth.currentUser)return;

  let imageBase64=null;
  const file=imageInput.files[0];

  if(file){
    imageBase64=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=()=>res(reader.result);
      reader.readAsDataURL(file);
    });
  }

  await addDoc(collection(db,"messages"),{
    text:msgInput.value,
    image:imageBase64,
    uid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });

  msgInput.value="";
  imageInput.value="";
};

/* AI */
document.getElementById("aiBtn").onclick=async()=>{
  const text=msgInput.value;
  if(!text)return;

  const res=await fetch(
  "https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"org_01kjpzdja9fantcz1g0jmhare9"
    },
    body:JSON.stringify({
      model:"gemma-7b-it",
      messages:[{role:"user",content:text}]
    })
  });

  const data=await res.json();
  msgInput.value=data.choices[0].message.content;
};
</script>
</body>
</html>
