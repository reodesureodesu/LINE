<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LINE Clone Ultimate</title>
<style>
body { font-family: sans-serif; background:#e5ddd5; }
#chat { display:none; }
.message { padding:8px; margin:5px; border-radius:10px; max-width:60%; }
.me { background:#9fe8a3; margin-left:auto; }
.other { background:white; }
</style>
</head>
<body>

<h2>LINE Clone Ultimate</h2>

<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="registerBtn">Register</button>
<button id="emailLoginBtn">Email Login</button>
<button id="googleLoginBtn">Google Login</button>

<div id="chat">
  <h3 id="welcome"></h3>
  <button id="logoutBtn">Logout</button>
  <br><br>
  <input id="msg" placeholder="message">
  <button id="sendBtn">Send</button>
  <div id="messages"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithPopup, 
  GoogleAuthProvider,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  query, 
  orderBy, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.appspot.com",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const registerBtn = document.getElementById("registerBtn");
const emailLoginBtn = document.getElementById("emailLoginBtn");
const googleLoginBtn = document.getElementById("googleLoginBtn");
const logoutBtn = document.getElementById("logoutBtn");

registerBtn.onclick = async () => {
  const email = email.value;
  const password = password.value;
  await createUserWithEmailAndPassword(auth,email,password);
};

emailLoginBtn.onclick = async () => {
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

googleLoginBtn.onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth,provider);
};

logoutBtn.onclick = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("chat").style.display="block";
    document.getElementById("welcome").innerText="Hello "+user.email;
  }
});

document.getElementById("sendBtn").onclick = async ()=>{
  const text = msg.value;
  if(!text) return;
  await addDoc(collection(db,"messages"),{
    text,
    uid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });
  msg.value="";
};

onSnapshot(query(collection(db,"messages"),orderBy("createdAt")),snapshot=>{
  const div = document.getElementById("messages");
  div.innerHTML="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    const p = document.createElement("div");
    p.className="message "+(data.uid===auth.currentUser?.uid?"me":"other");
    p.innerText=data.text;
    div.appendChild(p);
  });
});
</script>
</body>
</html>
