<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE Ultimate Stable+</title>
<style>
:root {
  --line-green: #06c755;
  --line-dark: #039244;
  --bg: linear-gradient(160deg, #ddfceb 0%, #e8f1ff 60%, #f6edff 100%);
  --card: rgba(255, 255, 255, 0.9);
  --text: #1f2937;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 14px 36px rgba(15, 23, 42, 0.18);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Inter", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
  background: var(--bg);
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px;
  color: var(--text);
}

#app {
  width: min(100%, 440px);
  height: min(94vh, 820px);
  display: flex;
  flex-direction: column;
  border-radius: 28px;
  overflow: hidden;
  background: var(--card);
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow: var(--shadow);
  backdrop-filter: blur(8px);
}

header {
  background: linear-gradient(130deg, var(--line-green) 0%, #24d66a 100%);
  color: #fff;
  padding: 16px 14px 12px;
}

#titleRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

#titleRow strong { font-size: 1.05rem; }

#tabRow, #bgRow {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.tabBtn,
.bgBtn {
  border: none;
  border-radius: 999px;
  padding: 7px 10px;
  cursor: pointer;
  font-size: 0.78rem;
}

.tabBtn {
  background: rgba(255, 255, 255, 0.18);
  color: white;
}

.tabBtn.active {
  background: #fff;
  color: var(--line-dark);
  font-weight: 700;
}

.bgBtn {
  background: rgba(255, 255, 255, 0.86);
  color: #1f2937;
}

#auth {
  display: grid;
  gap: 10px;
  padding: 22px;
  text-align: center;
}

#auth p {
  color: var(--muted);
  margin: 0 0 10px;
}

#main { display: none; flex: 1; overflow: hidden; }

.panel { display: none; flex: 1; min-height: 0; }
.panel.active { display: flex; flex-direction: column; }

#chatPanel { background: linear-gradient(180deg, #f8fbff 0%, #f0fff6 100%); }

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  max-width: 80%;
  padding: 10px 12px;
  border-radius: 14px;
  line-height: 1.45;
  box-shadow: 0 6px 14px rgba(15, 23, 42, 0.09);
}

.me {
  margin-left: auto;
  background: var(--line-green);
  color: white;
  border-bottom-right-radius: 4px;
}

.other {
  margin-right: auto;
  background: white;
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.chatimg {
  display: block;
  width: 100%;
  max-width: 200px;
  margin-top: 8px;
  border-radius: 10px;
}

#stampTray {
  border-top: 1px solid var(--border);
  padding: 8px 10px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  background: white;
}

.stampBtn {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #f9fafb;
  font-size: 1.2rem;
  cursor: pointer;
  min-width: 38px;
  min-height: 38px;
}

#inputArea {
  border-top: 1px solid var(--border);
  background: white;
  padding: 10px;
  display: grid;
  gap: 8px;
}

#msgRow { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; }

input, button, select {
  font: inherit;
  border-radius: 10px;
  border: 1px solid var(--border);
  padding: 10px;
}

input:focus, select:focus {
  outline: 2px solid rgba(6, 199, 85, 0.25);
  border-color: var(--line-green);
}

button {
  border: none;
  background: var(--line-green);
  color: white;
  cursor: pointer;
  font-weight: 600;
}

#aiBtn { background: #6366f1; }
#logout { background: #ef4444; margin: 10px; }
#googleLogin { background: white; color: #111827; border: 1px solid #d1d5db; }

#friendPanel {
  padding: 12px;
  gap: 10px;
  background: #f8fafc;
}

.card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
}

.row { display: flex; gap: 8px; }

#friendList {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 8px;
  max-height: 210px;
  overflow-y: auto;
}

.friendItem {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
}

.muted { color: var(--muted); font-size: 0.86rem; }

#statusBar {
  font-size: 0.84rem;
  color: var(--muted);
  padding: 0 12px 6px;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="titleRow">
      <strong>LINE Ultimate+</strong>
      <button id="logout" type="button">ログアウト</button>
    </div>
    <div id="tabRow">
      <button class="tabBtn active" data-tab="chatPanel">チャット</button>
      <button class="tabBtn" data-tab="friendPanel">フレンド</button>
    </div>
    <div id="bgRow">
      <button class="bgBtn" data-bg="gradient">背景: グラデ</button>
      <button class="bgBtn" data-bg="city">背景: シティ</button>
      <button class="bgBtn" data-bg="nature">背景: 自然</button>
      <button class="bgBtn" data-bg="night">背景: ナイト</button>
      <input id="bgUpload" type="file" accept="image/*" title="背景画像をアップロード">
    </div>
  </header>

  <div id="auth">
    <h2>ログインしてスタート</h2>
    <p>Google またはメール認証で入室できます。</p>
    <button id="googleLogin" type="button">Googleログイン</button>
    <input id="email" placeholder="email" autocomplete="email">
    <input id="password" type="password" placeholder="password" autocomplete="current-password">
    <button id="register" type="button">新規登録</button>
    <button id="login" type="button">ログイン</button>
  </div>

  <div id="main">
    <div id="chatPanel" class="panel active">
      <div id="messages"></div>
      <div id="stampTray"></div>
      <div id="inputArea">
        <div id="msgRow">
          <input id="msg" placeholder="message">
          <button id="send" type="button">送信</button>
          <button id="aiBtn" type="button">AI補完</button>
        </div>
        <input type="file" id="imageInput" accept="image/*">
      </div>
      <div id="statusBar"></div>
    </div>

    <div id="friendPanel" class="panel">
      <div class="card">
        <strong>フレンド追加</strong>
        <div class="row" style="margin-top:8px;">
          <input id="friendName" placeholder="表示名 (例: Taro)">
          <button id="addFriend" type="button">追加</button>
        </div>
        <p class="muted">同じアカウントでログインするとフレンド一覧は保存されます。</p>
      </div>

      <div class="card" style="margin-top:8px;">
        <strong>フレンド一覧</strong>
        <ul id="friendList"></ul>
      </div>

      <div class="card" style="margin-top:8px;">
        <strong>追加機能</strong>
        <p class="muted">・スタンプ送信 ・背景着せ替え ・AIメッセージ補完 ・画像送信</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.appspot.com",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};

const GEMMA_KEY = "AIzaSyDY0Jcd-72QPZlfOJAtUCYxeRrjHBvJRtQ";
const STAMPS = ["😀", "😂", "🥳", "🔥", "❤️", "🙏", "👍", "🐶", "🌸", "🍣"];
const BG_PRESETS = {
  gradient: "linear-gradient(160deg, #ddfceb 0%, #e8f1ff 60%, #f6edff 100%)",
  city: "url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1600&q=80')",
  nature: "url('https://images.unsplash.com/photo-1470770903676-69b98201ea1c?auto=format&fit=crop&w=1600&q=80')",
  night: "url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1600&q=80')"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

const authDiv = document.getElementById("auth");
const mainDiv = document.getElementById("main");
const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msg");
const imageInput = document.getElementById("imageInput");
const stampTray = document.getElementById("stampTray");
const statusBar = document.getElementById("statusBar");
const friendList = document.getElementById("friendList");
const friendNameInput = document.getElementById("friendName");

function setStatus(text) {
  statusBar.textContent = text;
}

function getFriendDocRef(uid) {
  return doc(db, "users", uid, "meta", "friends");
}

function switchTab(tabId) {
  document.querySelectorAll(".panel").forEach((panel) => {
    panel.classList.toggle("active", panel.id === tabId);
  });
  document.querySelectorAll(".tabBtn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.tab === tabId);
  });
}

document.querySelectorAll(".tabBtn").forEach((btn) => {
  btn.addEventListener("click", () => switchTab(btn.dataset.tab));
});

function applyBackground(value) {
  localStorage.setItem("line_bg", value);
  if (value.startsWith("data:image")) {
    document.body.style.backgroundImage = `url('${value}')`;
  } else {
    document.body.style.backgroundImage = BG_PRESETS[value] || BG_PRESETS.gradient;
  }
}

const savedBg = localStorage.getItem("line_bg") || "gradient";
applyBackground(savedBg);

Array.from(document.querySelectorAll(".bgBtn")).forEach((button) => {
  button.addEventListener("click", () => applyBackground(button.dataset.bg));
});

document.getElementById("bgUpload").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const base64 = await new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
  applyBackground(base64);
});

function initStamps() {
  stampTray.innerHTML = "";
  STAMPS.forEach((emoji) => {
    const btn = document.createElement("button");
    btn.className = "stampBtn";
    btn.type = "button";
    btn.textContent = emoji;
    btn.addEventListener("click", async () => {
      if (!auth.currentUser) return;
      await addDoc(collection(db, "messages"), {
        text: emoji,
        image: null,
        uid: auth.currentUser.uid,
        createdAt: serverTimestamp()
      });
    });
    stampTray.appendChild(btn);
  });
}
initStamps();

async function renderFriends(user) {
  const ref = getFriendDocRef(user.uid);
  const snap = await getDoc(ref);
  const friends = snap.exists() ? snap.data().list || [] : [];
  friendList.innerHTML = "";

  if (!friends.length) {
    const li = document.createElement("li");
    li.className = "muted";
    li.textContent = "まだフレンドがいません";
    friendList.appendChild(li);
    return;
  }

  friends.forEach((name, index) => {
    const li = document.createElement("li");
    li.className = "friendItem";
    const left = document.createElement("span");
    left.textContent = `👤 ${name}`;
    const right = document.createElement("button");
    right.type = "button";
    right.textContent = "削除";
    right.style.background = "#ef4444";
    right.addEventListener("click", async () => {
      friends.splice(index, 1);
      await setDoc(ref, { list: friends }, { merge: true });
      renderFriends(user);
    });
    li.append(left, right);
    friendList.appendChild(li);
  });
}

/* ログイン */
document.getElementById("googleLogin").onclick = () => signInWithPopup(auth, googleProvider);

document.getElementById("register").onclick = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

document.getElementById("login").onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    alert(e.message);
  }
};

document.getElementById("logout").onclick = () => signOut(auth);

/* フレンド */
document.getElementById("addFriend").onclick = async () => {
  if (!auth.currentUser) return;
  const name = friendNameInput.value.trim();
  if (!name) return;

  const ref = getFriendDocRef(auth.currentUser.uid);
  const snap = await getDoc(ref);
  const current = snap.exists() ? snap.data().list || [] : [];

  if (!current.includes(name)) {
    current.push(name);
    await setDoc(ref, { list: current }, { merge: true });
  }

  friendNameInput.value = "";
  renderFriends(auth.currentUser);
};

/* 認証監視 */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    authDiv.style.display = "grid";
    mainDiv.style.display = "none";
    return;
  }

  authDiv.style.display = "none";
  mainDiv.style.display = "flex";
  renderFriends(user);

  const q = query(collection(db, "messages"), orderBy("createdAt"));
  onSnapshot(q, (snap) => {
    messagesDiv.innerHTML = "";
    snap.forEach((d) => {
      const data = d.data();
      const div = document.createElement("div");
      div.className = "msg " + (data.uid === user.uid ? "me" : "other");
      div.textContent = data.text || "";

      if (data.image) {
        const img = document.createElement("img");
        img.src = data.image;
        img.className = "chatimg";
        div.appendChild(img);
      }

      messagesDiv.appendChild(div);
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
});

/* 送信 */
document.getElementById("send").onclick = async () => {
  if (!auth.currentUser) return;

  let imageBase64 = null;
  const file = imageInput.files[0];

  if (file) {
    imageBase64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  await addDoc(collection(db, "messages"), {
    text: msgInput.value,
    image: imageBase64,
    uid: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  msgInput.value = "";
  imageInput.value = "";
};

/* AI */
document.getElementById("aiBtn").onclick = async () => {
  const text = msgInput.value.trim();
  if (!text) return;

  setStatus("AIが考え中...");
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMMA_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `次の文章を自然なチャット向けに短く返信して: ${text}` }] }]
        })
      }
    );

    const data = await res.json();
    const aiText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!aiText) throw new Error("AIレスポンスが取得できませんでした");

    msgInput.value = aiText;
    setStatus("AI補完を反映しました");
  } catch (e) {
    console.error(e);
    setStatus("AI補完に失敗しました。時間をおいて再試行してください。");
  }
};
</script>
</body>
</html>
