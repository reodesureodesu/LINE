<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LINE Ultimate</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#app{
  width:400px;
  height:650px;
  background:white;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
header{
  background:#06c755;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.msg{
  margin:5px 0;
  padding:8px 12px;
  border-radius:15px;
  max-width:70%;
  word-wrap:break-word;
}
.me{background:#06c755;color:white;margin-left:auto;}
.other{background:#eee;}
img.chatimg{max-width:150px;border-radius:10px;margin-top:5px;}
#inputArea{
  display:flex;
  padding:10px;
  gap:5px;
}
input,button{
  padding:8px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#06c755;
  color:white;
  border:none;
  cursor:pointer;
}
#auth{
  padding:20px;
  text-align:center;
}
</style>
</head>
<body>
<div id="app">
<header>LINE Ultimate</header>

<div id="auth">
  <button id="googleLogin">Googleログイン</button><br><br>
  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button id="emailRegister">新規登録</button>
  <button id="emailLogin">ログイン</button>
</div>

<div id="chat" style="display:none;">
  <div id="messages"></div>
  <div id="inputArea">
    <input id="msg" placeholder="message">
    <input type="file" id="imageInput">
    <button id="send">送信</button>
    <button id="ai">AI</button>
  </div>
  <button id="logout">ログアウト</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup,
createUserWithEmailAndPassword, signInWithEmailAndPassword,
onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot,
query, orderBy, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  
  const authDiv = document.getElementById("auth");
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");
const msg = document.getElementById("msg");
const imageInput = document.getElementById("imageInput");

  const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.appspot.com",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};
  
const GEMMA_KEY = "AIzaSyDY0Jcd-72QPZlfOJAtUCYxeRrjHBvJRtQ";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const googleProvider = new GoogleAuthProvider();

document.getElementById("googleLogin").onclick=()=>{
  signInWithPopup(auth,googleProvider);
};

document.getElementById("emailRegister").onclick=()=>{
  createUserWithEmailAndPassword(auth,
    email.value,password.value);
};

document.getElementById("emailLogin").onclick=()=>{
  signInWithEmailAndPassword(auth,
    email.value,password.value);
};

document.getElementById("logout").onclick=()=>{
  signOut(auth);
};

onAuthStateChanged(auth,user=>{
  if(user){
    authDiv.style.display="none";
    chat.style.display="block";
  }else{
    authDiv.style.display="block";
    chat.style.display="none";
  }
});

document.getElementById("send").onclick=async()=>{
  if(!auth.currentUser)return;
  const text=msg.value;
  const file=imageInput.files[0];
  let imageBase64=null;

  if(file){
    imageBase64=await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=()=>res(reader.result);
      reader.readAsDataURL(file);
    });
  }

  await addDoc(collection(db,"messages"),{
    text,
    image:imageBase64,
    uid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });

  msg.value="";
  imageInput.value="";
};

onSnapshot(query(collection(db,"messages"),
orderBy("createdAt")),(snap)=>{
  messages.innerHTML="";
  snap.forEach(doc=>{
    const data=doc.data();
    const div=document.createElement("div");
    div.className="msg "+(data.uid===auth.currentUser?.uid?"me":"other");
    div.innerHTML=data.text||"";
    if(data.image){
      const img=document.createElement("img");
      img.src=data.image;
      img.className="chatimg";
      div.appendChild(img);
    }
    messages.appendChild(div);
  });
});

// 🔥 gemma3-4bit
document.getElementById("ai").onclick=async()=>{
  const text=msg.value;
  if(!text)return;

  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"org_01kjpzdja9fantcz1g0jmhare9"
    },
    body:JSON.stringify({
      model:"gemma-7b-it",
      messages:[{role:"user",content:text}]
    })
  });

  const data=await res.json();
  msg.value=data.choices[0].message.content;
};
</script>
</body>
</html>
