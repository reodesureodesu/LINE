<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06c755">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/app-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/app-icon.svg">
<title>LINE Ultimate Stable</title>
<style>
:root {
  --line-green: #06c755;
  --bg-gradient: linear-gradient(160deg, #d8f9e8 0%, #e6f0ff 55%, #f3ecff 100%);
  --surface: #ffffff;
  --surface-soft: #f6f8fb;
  --text-primary: #1f2937;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 16px 40px rgba(16, 24, 40, 0.14);
  --msg-font-size: 18px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  background: var(--bg-gradient);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  color: var(--text-primary);
}

#app {
  --app-width: min(100%, 420px);
  --app-height: min(92vh, 760px);
  position: relative;
  width: var(--app-width);
  height: var(--app-height);
  background: var(--surface);
  border-radius: 28px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  background: linear-gradient(120deg, var(--line-green) 0%, #2cd56e 100%);
  color: white;
  padding: 14px 12px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 8px;
  align-items: center;
}

#menuBtn, #themeToggle {
  border-radius: 10px;
  padding: 9px 10px;
}

#menuBtn { background: rgba(255,255,255,.24); }
#themeToggle { background: #111827; }

#sidebar {
  position: absolute;
  inset: 0 auto 0 0;
  width: min(92%, 360px);
  background: var(--surface);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.2s ease;
  z-index: 9;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 16px;
  overflow-y: auto;
  overscroll-behavior: contain;
}

#sidebar.open { transform: translateX(0); }

#backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15,23,42,.35);
  z-index: 8;
  display: none;
}

#backdrop.show { display: block; }

#friendSearchInput {
  min-height: 44px;
}

#friendList {
  list-style: none;
  padding: 0;
  margin: 0;
  overflow: auto;
  display: grid;
  gap: 10px;
  max-height: none;
  min-height: 150px;
}

.friend-item {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  background: var(--surface-soft);
}

.friend-item.active {
  border-color: var(--line-green);
  box-shadow: 0 0 0 2px rgba(6,199,85,0.2);
}

.friend-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: flex-start;
}

.friend-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 4px;
  max-width: 120px;
}

.friend-row button {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 0.75rem;
  background: #ef4444;
}

#auth {
  padding: 24px 20px;
  text-align: center;
  display: grid;
  gap: 10px;
}

#statusBar {
  min-height: 36px;
  padding: 9px 12px;
  font-size: 0.85rem;
  border-radius: 10px;
  background: #eff6ff;
  color: #1d4ed8;
  display: none;
  text-align: left;
}
#statusBar.error { background: #fef2f2; color: #b91c1c; }
#statusBar.success { background: #ecfdf5; color: #047857; }

#chat { display: none; flex: 1; flex-direction: column; background: linear-gradient(180deg, #f8fcff 0%, #f2fbf6 100%); min-height: 0; overflow: hidden; }

#toolbar {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}

#messages {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  margin: 0;
  padding: 10px 14px;
  border-radius: 16px;
  max-width: 78%;
  word-break: break-word;
  line-height: 1.4;
  font-size: var(--msg-font-size);
  box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
}

.me { background: var(--line-green); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
.other { background: #fff; color: var(--text-primary); margin-right: auto; border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.message-meta { display: block; margin-top: 6px; font-size: 0.72rem; opacity: 0.75; }
.reply-quote { border-left: 3px solid #94a3b8; padding-left: 8px; margin: 4px 0 6px; font-size: 0.78rem; opacity: 0.9; }
.unread-badge { display:inline-block; margin-left:6px; background:#ef4444; color:#fff; border-radius:999px; padding:1px 6px; font-size:0.66rem; }
.chatimg { width: 100%; max-width: 190px; border-radius: 10px; margin-top: 8px; display: block; }

.msg-actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}

.msg-actions button {
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
}

.msg-edit { background: #0ea5e9; }
.msg-delete { background: #ef4444; }

#bottomBar {
  position: sticky;
  bottom: 0;
  z-index: 2;
  background: var(--surface);
  border-top: 1px solid var(--border);
}


#inputArea { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 12px; background: var(--surface); }
#imageInput,
#profileImageInput,
#backgroundImageInput { grid-column: 1 / -1; }
#actions { display: flex; gap: 8px; }

#stampBar {
  display: flex;
  align-items: center;
  gap: 6px;
  overflow-x: auto;
  padding: 8px 12px 4px;
  border-top: 1px dashed var(--border);
  min-height: 46px;
}

.stamp-btn {
  min-width: 44px;
  height: 40px;
  border-radius: 12px;
  padding: 0;
  font-size: 1.35rem;
  background: #e5e7eb;
  color: #111827;
}

.msg.stamp-only {
  font-size: 2.4rem;
  line-height: 1.05;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 4px 8px;
  width: fit-content;
  max-width: 100%;
}

.msg.stamp-only.me {
  color: #111827;
}

.msg.stamp-only .message-meta {
  font-size: 0.65rem;
  opacity: 0.75;
}


.friend-badges {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.friend-badges small {
  font-size: 0.65rem;
  background: #e0f2fe;
  color: #0369a1;
  border-radius: 999px;
  padding: 1px 6px;
}

input, button { font: inherit; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); }
input { width: 100%; background: var(--surface-soft); }

input[type="file"] {
  width: 100%;
  border: 1px solid #dfe6e3;
  background: #f6faf8;
  border-radius: 14px;
  padding: 8px;
  color: #374151;
}

input[type="file"]::file-selector-button {
  border: none;
  background: var(--line-green);
  color: white;
  border-radius: 999px;
  padding: 8px 14px;
  margin-right: 10px;
  font-weight: 700;
  cursor: pointer;
}

input[type="file"]::file-selector-button:hover {
  opacity: 0.92;
}
button { background: var(--line-green); color: white; border: none; cursor: pointer; font-weight: 600; }
#googleLogin { background: #fff; color: #111827; border: 1px solid #d1d5db; }
#logout { margin: 0 12px 12px; background: #ef4444; }
#aiBtn { background: #6366f1; }
#recordBtn { background: #ef4444; }


#notifyBtn {
  position: relative;
  background: #0f172a;
  min-width: 44px;
}

#notifyCount {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #ef4444;
  color: #fff;
  border-radius: 999px;
  font-size: 0.65rem;
  padding: 1px 5px;
}

#notifyPanel {
  position: absolute;
  top: 70px;
  right: 10px;
  width: min(90%, 320px);
  max-height: 60%;
  overflow: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  z-index: 20;
  padding: 10px;
  display: none;
  box-shadow: var(--shadow);
}

.notify-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px;
  margin-top: 8px;
  background: var(--surface-soft);
}

.notify-item button { margin-top: 6px; padding: 6px 8px; border-radius: 8px; }

#profileAvatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,.5);
  background: rgba(255,255,255,.2);
}

#messages.custom-bg {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.sidebar-section {
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.inline-btn-row {
  display: flex;
  gap: 8px;
}

.inline-btn-row button,
.inline-btn-row input {
  min-width: 0;
}

#retryQueueBtn[disabled] {
  opacity: .6;
  cursor: not-allowed;
}

#videoCallBtn {
  background: #7c3aed;
}

#incomingCallBar {
  position: absolute;
  top: 72px;
  left: 12px;
  right: 12px;
  z-index: 22;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: #0f172a;
  color: #fff;
  border-radius: 12px;
  padding: 10px;
}

#incomingCallBar button {
  padding: 6px 10px;
  border-radius: 8px;
}

#callOverlay {
  position: absolute;
  inset: 0;
  background: rgba(2, 6, 23, .88);
  z-index: 23;
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
}

#callHeader {
  color: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

#callVideoGrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  min-height: 0;
  flex: 1;
}

.call-video {
  width: 100%;
  height: 100%;
  min-height: 200px;
  border-radius: 12px;
  background: #000;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,.2);
}

#localVideo { transform: scaleX(-1); }

#endCallBtn {
  background: #ef4444;
}

body.dark {
  --bg-gradient: linear-gradient(160deg, #0f172a 0%, #111827 60%, #1f2937 100%);
  --surface: #111827;
  --surface-soft: #1f2937;
  --text-primary: #f9fafb;
  --text-muted: #9ca3af;
  --border: #374151;
}
body.dark #toolbar, body.dark #inputArea, body.dark #googleLogin, body.dark #bottomBar, body.dark #stampBar { background: #1f2937; color: #f9fafb; }
body.dark .other { background: #1f2937; color: #f9fafb; }
</style>
</head>
<body>
<div id="app">
  <div id="backdrop"></div>

  <aside id="sidebar">
    <h3 style="margin:4px 0">フレンド</h3>
    <div>
      <input id="friendEmail" placeholder="friend@example.com">
      <input id="friendName" placeholder="フレンド表示名（任意）" style="margin-top:8px">
      <button id="addFriend" style="margin-top:8px;width:100%">メールでフレンド追加</button>
      <input id="friendRequestName" placeholder="表示名でフレンド申請" style="margin-top:8px">
      <button id="sendFriendRequest" style="margin-top:8px;width:100%;background:#6366f1">名前で申請を送る</button>
      <button id="copyInviteLink" style="margin-top:8px;width:100%;background:#0ea5e9">URL招待リンクをコピー</button>
      <button id="acceptInviteLink" style="margin-top:8px;width:100%;background:#7c3aed;display:none;">このURL招待を承認</button>
    </div>
    <input id="friendSearchInput" placeholder="フレンド検索" style="margin-top:8px">
    <ul id="friendList"></ul>
    <div class="sidebar-section">
      <label for="customStampInput">カスタムスタンプ（画像/GIF）</label>
      <input id="customStampInput" type="file" accept="image/*,.gif">
      <button id="addCustomStamp" style="margin-top:8px;width:100%;background:#f97316">カスタムスタンプ追加</button>
    </div>
    <div class="sidebar-section">
      <label for="profileImageInput">プロフィール画像（GIF可）</label>
      <input id="profileImageInput" type="file" accept="image/*,.gif">
      <label for="backgroundImageInput" style="margin-top:8px;display:block;">背景画像（GIF可）</label>
      <input id="backgroundImageInput" type="file" accept="image/*,.gif">
    </div>
    <div class="sidebar-section">
      <label for="fontSizeSlider">文字サイズスライドバー</label>
      <input id="fontSizeSlider" type="range" min="14" max="24" value="18">
    </div>
    <div class="sidebar-section">
      <label for="screenPreset">画面サイズ</label>
      <select id="screenPreset" style="margin-top:8px;">
        <option value="smartphone">スマホ</option>
        <option value="tablet">タブレット</option>
        <option value="pc">PC</option>
        <option value="custom">カスタム</option>
      </select>
      <div class="inline-btn-row" style="margin-top:8px;">
        <input id="customWidth" type="number" min="320" max="1200" placeholder="幅(px)">
        <input id="customHeight" type="number" min="480" max="1200" placeholder="高さ(px)">
      </div>
      <button id="applyScreenSize" style="margin-top:8px;width:100%;background:#0ea5e9">サイズを適用</button>
    </div>
  </aside>

  <header>
    <button id="menuBtn">☰</button>
    <strong id="appTitle" style="text-align:center;letter-spacing:.02em">LINE Ultimate</strong>
    <div style="display:flex; gap:8px; justify-self:end; align-items:center;">
      <button id="miniGameBtn" title="ミニゲーム">🎮</button>
      <button id="installAppBtn" title="アプリをインストール" style="display:none;background:#2563eb;">⬇️</button>
      <button id="notifyBtn">🔔<span id="notifyCount">0</span></button>
      <img id="profileAvatar" alt="avatar">
      <button id="themeToggle">テーマ</button>
    </div>
  </header>

  <div id="notifyPanel"><div style="display:flex;justify-content:space-between;align-items:center;"><strong>通知ボックス</strong><button id="closeNotify">閉じる</button></div><div id="notifyList"></div><hr><strong>送信済み申請</strong><div id="sentRequestList"></div></div>

  <div id="miniGamePanel" style="display:none;position:absolute;top:72px;right:12px;width:min(92%,300px);z-index:21;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <strong>ミニゲーム</strong>
      <button id="closeMiniGame" style="background:#64748b;">閉じる</button>
    </div>
    <p style="margin:10px 0 8px;color:var(--text-muted);font-size:.85rem;">10秒以内にどれだけタップできるか！</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button id="startMiniGame" style="background:#06c755;">スタート</button>
      <small id="miniGameTimer">残り: 10.0秒</small>
      <small id="miniGameScore">スコア: 0</small>
      <small id="miniGameBest">ベスト: 0</small>
    </div>
    <button id="tapMiniGame" style="margin-top:10px;width:100%;min-height:74px;font-size:1.1rem;background:#f59e0b;" disabled>タップ！</button>
  </div>

  <div id="incomingCallBar">
    <small id="incomingCallText">着信中...</small>
    <div style="display:flex;gap:6px;">
      <button id="acceptCallBtn" style="background:#06c755;">応答</button>
      <button id="rejectCallBtn" style="background:#ef4444;">拒否</button>
    </div>
  </div>

  <div id="callOverlay">
    <div id="callHeader">
      <strong id="callStatusText">ビデオ通話</strong>
      <button id="endCallBtn">通話終了</button>
    </div>
    <div id="callVideoGrid">
      <div style="position:relative;min-height:0;">
        <small style="position:absolute;left:8px;top:8px;z-index:1;background:rgba(15,23,42,.65);color:#fff;padding:2px 6px;border-radius:999px;">相手</small>
        <video id="remoteVideo" class="call-video" autoplay playsinline></video>
      </div>
      <div style="position:relative;min-height:0;">
        <small style="position:absolute;left:8px;top:8px;z-index:1;background:rgba(15,23,42,.65);color:#fff;padding:2px 6px;border-radius:999px;">自分</small>
        <video id="localVideo" class="call-video" autoplay muted playsinline></video>
      </div>
    </div>
  </div>

  <div id="auth">
    <h2 style="margin:0">ログインしてチャットを始めましょう</h2>
    <p style="margin:0;color:var(--text-muted)">Google またはメールアドレスでサインインできます。</p>
    <div id="statusBar"></div>
    <button id="googleLogin">Googleログイン</button>
    <small id="authHint" style="display:block;color:var(--text-muted);margin-top:-4px;">※ Googleログインが失敗した場合はメールログインをお使いください。</small>
    <input id="email" placeholder="email" autocomplete="email">
    <input id="password" type="password" placeholder="password" autocomplete="current-password">
    <input id="displayName" placeholder="表示名（初回のみ設定）" autocomplete="nickname">
    <button id="register">新規登録</button>
    <button id="login">ログイン</button>
  </div>

  <div id="chat">
    <div id="toolbar">
      <input id="searchInput" placeholder="メッセージ検索...">
      <button id="copyInviteQuick" style="background:#0ea5e9">URLコピー</button>
      <button id="retryQueueBtn" style="background:#f59e0b">再送</button>
      <button id="videoCallBtn" title="フレンドとビデオ通話">📹通話</button>
      <small id="chatMode" style="align-self:center;white-space:nowrap">全体</small>
    </div>
    <div id="messages"></div>
    <div id="stampBar"></div>
    <div id="bottomBar">
      <div id="replyPreview" style="display:none;padding:8px 12px;border-bottom:1px solid var(--border);"></div>
      <div id="inputArea">
        <input id="msg" placeholder="message">
        <div id="actions">
          <button id="send">送信</button>
          <button id="aiBtn">AI</button>
          <button id="recordBtn">🎤録音</button>
        </div>
        <input type="file" id="imageInput" accept="image/*">
      </div>
      <button id="logout">ログアウト</button>
    </div>
  </div>
</div>

  if (mute) videoEl.volume = 0;

  await videoEl.play().catch(() => {});
};

const closeActiveCall = async (nextStatus = null) => {
  if (nextStatus && activeCall.id) {
    try {
      await updateDoc(doc(db, "calls", activeCall.id), { status: nextStatus, endedAt: serverTimestamp() });
    } catch (_error) {}
  }
  activeCall.unsubscribers.forEach((fn) => fn && fn());
  activeCall.unsubscribers = [];
  if (activeCall.pc) {
    try { activeCall.pc.close(); } catch (_error) {}
  }
  if (activeCall.localStream) {
    activeCall.localStream.getTracks().forEach((t) => t.stop());
  }
  activeCall = { id: null, pc: null, localStream: null, unsubscribers: [], isCaller: false };
  pendingIncomingCall = null;
  resetCallUi();
};

const beginIncomingCallWatcher = (user) => {
  if (incomingCallWatcher) incomingCallWatcher();
  const myEmail = normalizeEmail(user.email || "");
  incomingCallWatcher = onSnapshot(query(collection(db, "calls"), where("targetEmail", "==", myEmail)), (snap) => {
    const ringing = snap.docs
      .map((d) => ({ id: d.id, ...d.data() }))
      .find((call) => call.status === "ringing");

    if (!ringing || activeCall.id === ringing.id) {
      if (!activeCall.id) ui.incomingCallBar.style.display = "none";
      return;
    }

    pendingIncomingCall = ringing;
    ui.incomingCallText.textContent = `${ringing.callerName || ringing.callerEmail || "フレンド"} から着信中`;
    ui.incomingCallBar.style.display = "flex";
  });
};

const attachCallCommonHandlers = (pc) => {
  pc.ontrack = (event) => {
    const [remoteStream] = event.streams;
    if (remoteStream) {
      attachStreamToVideo(ui.remoteVideo, remoteStream).catch(() => {});
    }
  };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === "connected") {
      ui.callStatusText.textContent = "通話中";
    }
    if (["disconnected", "failed", "closed"].includes(pc.connectionState)) {
      closeActiveCall();
    }
  };
};

const startVideoCall = async () => {
  if (!auth.currentUser) return;
  if (!selectedFriendEmail) {
    setStatus("1:1の相手を選んでからビデオ通話してください。", "error");
    return;
  }
  if (!canSendToCurrentFriend()) return;
  if (activeCall.id) {
    setStatus("すでに通話中です。", "error");
    return;
  }

  const localStream = await getCallMediaStream();
  await attachStreamToVideo(ui.localVideo, localStream, { mute: true });
  ui.callOverlay.style.display = "flex";
  ui.callStatusText.textContent = "発信中...";

  const callId = buildConversationId(auth.currentUser.email || "", selectedFriendEmail);
  const pc = new RTCPeerConnection(rtcConfig);
  attachCallCommonHandlers(pc);
  localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

  activeCall = { id: callId, pc, localStream, unsubscribers: [], isCaller: true };

  const callRef = doc(db, "calls", callId);
  await setDoc(callRef, {
    callerUid: auth.currentUser.uid,
    callerEmail: normalizeEmail(auth.currentUser.email || ""),
    callerName: userSettings.fixedName || auth.currentUser.displayName || "friend",
    targetEmail: normalizeEmail(selectedFriendEmail),
    status: "ringing",
    createdAt: serverTimestamp()
  }, { merge: true });

  pc.onicecandidate = async (event) => {
    if (!event.candidate) return;
    await addDoc(collection(db, "calls", callId, "offerCandidates"), event.candidate.toJSON());
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await updateDoc(callRef, { offer: { type: offer.type, sdp: offer.sdp } });

  activeCall.unsubscribers.push(onSnapshot(doc(db, "calls", callId), async (snap) => {
    const data = snap.data();
    if (!data) return;
    if (data.status === "rejected") {
      setStatus("通話は拒否されました。", "error");
      await closeActiveCall();
      return;
    }
    if (data.status === "ended") {
      await closeActiveCall();
      return;
    }
    if (data.answer && !pc.currentRemoteDescription) {
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
  }));

  activeCall.unsubscribers.push(onSnapshot(collection(db, "calls", callId, "answerCandidates"), (snap) => {
    snap.docChanges().forEach((change) => {
      if (change.type === "added") {
        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
      }
    });
  }));
};

const acceptIncomingCall = async () => {
  if (!auth.currentUser || !pendingIncomingCall) return;
  if (activeCall.id) {
    setStatus("別の通話中です。", "error");
    return;
  }
  const callId = pendingIncomingCall.id;
  const callRef = doc(db, "calls", callId);
  const localStream = await getCallMediaStream();
  await attachStreamToVideo(ui.localVideo, localStream, { mute: true });
  ui.callOverlay.style.display = "flex";
  ui.incomingCallBar.style.display = "none";
  ui.callStatusText.textContent = "接続中...";

  const pc = new RTCPeerConnection(rtcConfig);
  attachCallCommonHandlers(pc);
  localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));
  activeCall = { id: callId, pc, localStream, unsubscribers: [], isCaller: false };

  pc.onicecandidate = async (event) => {
    if (!event.candidate) return;
    await addDoc(collection(db, "calls", callId, "answerCandidates"), event.candidate.toJSON());
  };

  if (pendingIncomingCall.offer) {
    await pc.setRemoteDescription(new RTCSessionDescription(pendingIncomingCall.offer));
  }
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await updateDoc(callRef, {
    answer: { type: answer.type, sdp: answer.sdp },
    status: "connected",
    acceptedAt: serverTimestamp()
  });

  activeCall.unsubscribers.push(onSnapshot(collection(db, "calls", callId, "offerCandidates"), (snap) => {
    snap.docChanges().forEach((change) => {
      if (change.type === "added") {
        pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
      }
    });
  }));

  activeCall.unsubscribers.push(onSnapshot(callRef, async (snap) => {
    const data = snap.data();
    if (!data) return;
    if (data.status === "ended") await closeActiveCall();
  }));
};

const fileToDataUrl = (file) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result);
  reader.readAsDataURL(file);
});

const compressImageFile = async (file, maxSize = 1280, quality = 0.82) => {
  if (!file || !file.type.startsWith("image/") || file.type === "image/gif") return file;
  const imgUrl = await fileToDataUrl(file);
  const img = new Image();
  await new Promise((resolve) => { img.onload = resolve; img.src = imgUrl; });
  const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
  const canvas = document.createElement("canvas");
  canvas.width = Math.round(img.width * scale);
  canvas.height = Math.round(img.height * scale);
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/jpeg", quality));
  return new File([blob], file.name.replace(/\.[^.]+$/, ".jpg"), { type: "image/jpeg" });
};

const playPopSound = () => {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;
  const ctx = new AudioContextClass();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "square";
  osc.frequency.setValueAtTime(980, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.05);
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.09);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.12);
  setTimeout(() => ctx.close(), 200);
};

const enqueueFailed = (payload) => {
  failedQueue.push({
    id: crypto.randomUUID(),
    payload,
    createdAt: Date.now()
  });
  persistFailedQueue();
};

const postMessage = async (payload, skipQueue=false) => {
  try {
    await addDoc(collection(db, "messages"), buildMessagePayload(payload));
    if (selectedFriendEmail) {
      await setDoc(doc(db, "users", auth.currentUser.uid, "friends", friendDocId(selectedFriendEmail)), {
        lastChattedAt: serverTimestamp()
      }, { merge: true });
    }
    playPopSound();
    return true;
  } catch (error) {
    if (!skipQueue) {
      enqueueFailed(payload);
      setStatus("送信に失敗したため再送キューに保存しました。", "error");
    }
    return false;
  }
};

const retryFailedQueue = async () => {
  if (!failedQueue.length) {
    setStatus("再送キューは空です。", "info");
    updateRetryButton();
    return;
  }
  ui.retryQueueBtn.disabled = true;
  ui.retryQueueBtn.textContent = "再送中...";
  const remaining = [];
  for (const item of failedQueue) {
    const ok = await postMessage(item.payload, true);
    if (!ok) remaining.push(item);
  }
  failedQueue = remaining;
  persistFailedQueue();
  setStatus(remaining.length ? `再送完了（一部失敗 ${remaining.length} 件）` : "再送キューを送信しました。", remaining.length ? "error" : "success");
};

const markMessagesAsRead = async (messages, user) => {
  for (const msg of messages) {
    if (!msg?.id || msg.uid === user.uid) continue;
    const ids = Array.isArray(msg.readByIds) ? msg.readByIds : [];
    if (ids.includes(user.uid)) continue;
    try {
      await updateDoc(doc(db, "messages", msg.id), { readByIds: arrayUnion(user.uid) });
      msg.readByIds = [...ids, user.uid];
    } catch (error) {
      console.warn("read receipt update failed", error);
    }
  }
};

const renderFriends = () => {
  ui.friendList.innerHTML = "";
  const keyword = (ui.friendSearchInput?.value || "").trim().toLowerCase();

  const globalItem = document.createElement("li");
  globalItem.className = `friend-item ${selectedFriendEmail ? "" : "active"}`;
  const globalUnread = allMessages.filter((msg) => !normalizeEmail(msg.targetEmail || "") && msg.uid !== (auth.currentUser?.uid || "") && !(Array.isArray(msg.readByIds) ? msg.readByIds : []).includes(auth.currentUser?.uid || "")).length;
  globalItem.innerHTML = `<div class="friend-row"><strong>全体チャット ${globalUnread ? `<span class="unread-badge">${globalUnread}</span>` : ""}</strong><button style="background:#0ea5e9">選択</button></div>`;
  globalItem.querySelector("button").onclick = () => {
    selectedFriendEmail = "";
    renderFriends();
    renderMessages();
  };
  ui.friendList.appendChild(globalItem);

  const meUid = auth.currentUser?.uid || "";
  const meEmail = normalizeEmail(auth.currentUser?.email || "");
  const friendUnread = {};
  for (const msg of allMessages) {
    const target = normalizeEmail(msg.targetEmail || "");
    const sender = normalizeEmail(msg.senderEmail || "");
    if (!target) continue;
    if (target !== meEmail) continue;
    if (msg.uid === meUid) continue;
    const ids = Array.isArray(msg.readByIds) ? msg.readByIds : [];
    if (ids.includes(meUid)) continue;
    friendUnread[sender] = (friendUnread[sender] || 0) + 1;
  }

  const sortedFriends = [...friends]
    .sort((a, b) => Number(Boolean(b.favorite)) - Number(Boolean(a.favorite)) || (toMillis(b.lastChattedAt) - toMillis(a.lastChattedAt)));

  sortedFriends
    .filter((friend) => {
      if (!keyword) return true;
      return (friend.email || "").toLowerCase().includes(keyword) || (friend.name || "").toLowerCase().includes(keyword);
    })
    .forEach((friend) => {
      const li = document.createElement("li");
      const friendEmail = normalizeEmail(friend.email || "");
      li.className = `friend-item ${selectedFriendEmail === friendEmail ? "active" : ""}`;
      const unread = friendUnread[friendEmail] || 0;
      li.innerHTML = `<div class="friend-row"><div><strong>${safeText(friend.name || "Friend")}</strong>${unread ? `<span class="unread-badge">${unread}</span>` : ""}<br><small>${safeText(friendEmail || "(メール未設定)")}</small><div class="friend-badges">${friend.favorite ? "<small>お気に入り</small>" : ""}${friend.blocked ? "<small>ブロック中</small>" : ""}</div></div><div class="friend-actions"><button class="select">選択</button><button class="favorite">★</button><button class="rename">名前</button><button class="block">🚫</button><button class="delete">削除</button></div></div>`;
      li.querySelector(".select").style.background = "#0ea5e9";
      li.querySelector(".select").onclick = () => {
        selectedFriendEmail = friendEmail;
        renderFriends();
        renderMessages();
        closeSidebar();
      };
      li.querySelector(".favorite").style.background = friend.favorite ? "#f59e0b" : "#64748b";
      li.querySelector(".favorite").onclick = async () => {
        if (!auth.currentUser) return;
        await setDoc(doc(db, "users", auth.currentUser.uid, "friends", friendDocId(friendEmail)), {
          favorite: !friend.favorite,
          updatedAt: serverTimestamp()
        }, { merge: true });
      };
      li.querySelector(".rename").style.background = "#6366f1";
      li.querySelector(".rename").onclick = async () => {
        if (!auth.currentUser) return;
        const nextName = prompt("フレンド表示名を入力してください", friend.name || "");
        if (nextName === null) return;
        await setDoc(doc(db, "users", auth.currentUser.uid, "friends", friendDocId(friendEmail)), {
          email: friendEmail,
          name: nextName.trim() || (friendEmail.split("@")[0] || "friend"),
          updatedAt: serverTimestamp()
        }, { merge: true });
      };
      li.querySelector(".block").style.background = friend.blocked ? "#991b1b" : "#475569";
      li.querySelector(".block").onclick = async () => {
        if (!auth.currentUser) return;
        await setDoc(doc(db, "users", auth.currentUser.uid, "friends", friendDocId(friendEmail)), {
          blocked: !friend.blocked,
          updatedAt: serverTimestamp()
        }, { merge: true });
      };
      li.querySelector(".delete").onclick = async () => {
        if (!auth.currentUser) return;
        await deleteDoc(doc(db, "users", auth.currentUser.uid, "friends", friendDocId(friendEmail)));
      };
      ui.friendList.appendChild(li);
    });
};

const filteredMessages = (applyKeyword = true) => {
  if (!auth.currentUser) return [];
  const me = normalizeEmail(auth.currentUser.email || "");
  const keyword = applyKeyword ? ui.searchInput.value.trim().toLowerCase() : "";

  return allMessages
    .filter((msg) => {
      const sender = normalizeEmail(msg.senderEmail || "");
      const target = normalizeEmail(msg.targetEmail || "");
      if (selectedFriendEmail) {
        const friend = normalizeEmail(selectedFriendEmail);
        const convId = buildConversationId(me, friend);
        const inConv = msg.conversationId ? msg.conversationId === convId : ((sender === me && target === friend) || (sender === friend && target === me));
        return inConv;
      }
      return !target;
    })
    .filter((msg) => !keyword || (msg.text || "").toLowerCase().includes(keyword));
};

const startEditMessage = (message) => {
  if (!message || !message.id) return;
  editingMessageId = message.id;
  ui.msgInput.value = message.text || "";
  document.getElementById("send").textContent = "更新";
  ui.msgInput.focus();
  setStatus("編集モード: テキストを修正して更新を押してください。", "info");
};

const cancelEditMode = () => {
  editingMessageId = null;
  document.getElementById("send").textContent = "送信";
};

const renderMessages = () => {
  const user = auth.currentUser;
  if (!user) return;

  const wasNearBottom = ui.messagesDiv.scrollHeight - ui.messagesDiv.scrollTop - ui.messagesDiv.clientHeight < 90;
  ui.messagesDiv.innerHTML = "";
  if (selectedFriendEmail) {
    const friend = friends.find((item) => normalizeEmail(item.email) === normalizeEmail(selectedFriendEmail));
    ui.chatMode.textContent = `1:1 ${friend?.name || selectedFriendEmail}`;
  } else {
    ui.chatMode.textContent = "全体";
  }

  const visibleMessages = filteredMessages(true);
  const readTargetMessages = filteredMessages(false);
  visibleMessages.forEach((data) => {
    const div = document.createElement("div");
    const isStampOnly = !!(data.text && STAMPS.includes((data.text || "").trim()) && !data.image && !data.audio);
    div.className = "msg " + (data.uid === user.uid ? "me" : "other") + (isStampOnly ? " stamp-only" : "");
    div.textContent = data.text || "";

    if (data.replyToText) {
      const quote = document.createElement("div");
      quote.className = "reply-quote";
      quote.textContent = `↪ ${data.replyToName || "匿名"}: ${data.replyToText}`;
      div.prepend(quote);
    }

    if (data.stampImage) {
      const simg = document.createElement("img");
      simg.src = data.stampImage;
      simg.className = "chatimg";
      simg.style.maxWidth = "120px";
      div.appendChild(simg);
    }

    if (data.image) {
      const img = document.createElement("img");
      img.src = data.image;
      img.className = "chatimg";
      div.appendChild(img);
    }

    if (data.audio) {
      const audio = document.createElement("audio");
      audio.src = data.audio;
      audio.controls = true;
      audio.style.marginTop = "8px";
      audio.style.width = "100%";
      div.appendChild(audio);
    }

    const meta = document.createElement("small");
    meta.className = "message-meta";
    const readIds = Array.isArray(data.readByIds) ? data.readByIds : [];
    const readCount = Math.max(readIds.length - 1, 0);
    const readDetail = data.uid === user.uid && readCount ? ` ・既読(${readCount}) ${readIds.slice(0,3).join(",")}` : "";
    meta.textContent = `${data.name || "匿名"}・${formatTime(data.createdAt)}${data.editedAt ? " (編集済み)" : ""}${readDetail}`;
    div.appendChild(meta);

    if (data.uid === user.uid && data.id) {
      const actionWrap = document.createElement("div");
      actionWrap.className = "msg-actions";

      const editBtn = document.createElement("button");
      editBtn.className = "msg-edit";
      editBtn.textContent = "編集";
      editBtn.onclick = () => startEditMessage(data);

      const replyBtn = document.createElement("button");
      replyBtn.className = "msg-edit";
      replyBtn.textContent = "返信";
      replyBtn.onclick = () => setReplyTarget(data);

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "msg-delete";
      deleteBtn.textContent = "削除";
      deleteBtn.onclick = async () => {
        if (!confirm("このメッセージを削除しますか？")) return;
        await deleteDoc(doc(db, "messages", data.id));
        if (editingMessageId === data.id) {
          cancelEditMode();
          ui.msgInput.value = "";
        }
      };

      actionWrap.append(editBtn, replyBtn, deleteBtn);
      div.appendChild(actionWrap);
    }

    ui.messagesDiv.appendChild(div);
  });

  if (wasNearBottom) {
    ui.messagesDiv.scrollTop = ui.messagesDiv.scrollHeight;
  }
  markMessagesAsRead(readTargetMessages, user).then(() => renderFriends());
};

};


document.getElementById("recordBtn").onclick = async () => {
  if (!auth.currentUser) return;
  if (!canSendToCurrentFriend()) return;

  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
    document.getElementById("recordBtn").textContent = "🎤録音";
    setStatus("録音を停止して送信中です...", "info");
    return;
  }

  try {
    recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(recordingStream);
    const chunks = [];

    mediaRecorder.ondataavailable = (event) => {
      if (event.data.size > 0) chunks.push(event.data);
    };

    mediaRecorder.onstop = async () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      const audioBase64 = await fileToDataUrl(new File([blob], "voice.webm", { type: "audio/webm" }));

      await postMessage({ text: "🎤 音声メッセージ", image: null, audio: audioBase64 });

      if (recordingStream) {
        recordingStream.getTracks().forEach((track) => track.stop());
      }
      setStatus("録音した音声を送信しました。", "success");
    };

    mediaRecorder.start();
    document.getElementById("recordBtn").textContent = "■停止";
    setStatus("録音中...もう一度押すと自動送信します。", "info");
  } catch (error) {
    setStatus("マイクを利用できませんでした。ブラウザ権限を確認してください。", "error");
  }
};

document.getElementById("send").onclick = async () => {
  if (!auth.currentUser) return;
  if (!canSendToCurrentFriend()) return;
  const text = ui.msgInput.value.trim();

  if (editingMessageId) {
    if (!text) {
      setStatus("編集メッセージは空にできません。", "error");
      return;
    }
    await updateDoc(doc(db, "messages", editingMessageId), {
      text,
      editedAt: serverTimestamp()
    });
    cancelEditMode();
    ui.msgInput.value = "";
    ui.imageInput.value = "";
    setStatus("メッセージを更新しました。", "success");
    return;
  }

  if (!text && !ui.imageInput.files[0]) return;

  let imageBase64 = null;
  const file = ui.imageInput.files[0];

  if (file) {
    const compressed = await compressImageFile(file);
    imageBase64 = await fileToDataUrl(compressed);
  }

  await postMessage({
    text,
    image: imageBase64,
    audio: null,
    replyToId: replyingTo?.id || null,
    replyToText: replyingTo?.text ? replyingTo.text.slice(0, 80) : null,
    replyToName: replyingTo?.name || null
  });

  replyingTo = null;
  ui.replyPreview.style.display = "none";
  ui.replyPreview.innerHTML = "";
  ui.msgInput.value = "";
  ui.imageInput.value = "";
};

document.getElementById("aiBtn").onclick = async () => {
  const text = ui.msgInput.value;
  if (!text) return;

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "org_01kjpzdja9fantcz1g0jmhare9"
    },
    body: JSON.stringify({
      model: "gemma-7b-it",
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();
  ui.msgInput.value = data.choices?.[0]?.message?.content || "AI応答を取得できませんでした";
};
</script>
