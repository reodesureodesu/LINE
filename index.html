<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LINE Clone</title>
</head>
<body>
  <h2>LINE Clone</h2>
  <button id="loginBtn">Google Login</button>
  <div id="chat" style="display:none;">
    <div id="messages"></div>
    <input id="msg" placeholder="message">
    <button id="sendBtn">Send</button>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔽 あなたのfirebaseConfigに置き換える
const firebaseConfig = {
  apiKey: "AIzaSyDNUzhTrnAAUJye82vNZEy0Sgnj7e8IR9E",
  authDomain: "line-16068.firebaseapp.com",
  projectId: "line-16068",
  storageBucket: "line-16068.firebasestorage.app",
  messagingSenderId: "35972275719",
  appId: "1:35972275719:web:383fd1ac8a47ceca96d4a2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBtn = document.getElementById("loginBtn");
const sendBtn = document.getElementById("sendBtn");

loginBtn.onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
  document.getElementById("chat").style.display = "block";
};

sendBtn.onclick = async () => {
  const text = document.getElementById("msg").value;
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text,
    createdAt: serverTimestamp(),
    uid: auth.currentUser.uid
  });

  document.getElementById("msg").value = "";
};

onSnapshot(query(collection(db, "messages"), orderBy("createdAt")), (snapshot) => {
  const div = document.getElementById("messages");
  div.innerHTML = "";
  snapshot.forEach(doc => {
    div.innerHTML += "<p>" + doc.data().text + "</p>";
  });
});
</script>
</body>
</html>
